<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            width: 100vw;
            font-family: "Inter", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        #top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 10px;
        }

        #spark-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0,255,255,0.5);
        }

        /* ── Model Badge ── */
        #model-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: #aaa;
        }
        #mode-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ffff;
            animation: pulse-dot 2s infinite;
        }
        #mode-dot.cloud { background: #a78bfa; }
        @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

        /* ── Mode Toggle Buttons ── */
        .btn-config {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1.5px solid rgba(255,255,255,0.15);
            background: transparent;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-config:hover { border-color: #00ffff; color: #00ffff; }

        /* ── Face ── */
        #face-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            flex: 1;
            justify-content: center;
        }

        #face-container {
            width: 100%;
            max-width: 760px;
            aspect-ratio: 1.9;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .eye, .mouth { fill: none; stroke: #00ffff; stroke-width: 15; stroke-linecap: round; stroke-linejoin: round; transition: all 0.3s ease-in-out; }
        .eye-fill { fill: #00ffff; transition: all 0.3s ease-in-out; }

        /* States */
        .state-Idle .left-eye  { ry:30; rx:40; cy:190; cx:250; }
        .state-Idle .right-eye { ry:30; rx:40; cy:190; cx:510; }
        .state-Idle .mouth { d: path("M 330 330 Q 380 345 430 330"); }
        .state-Idle .left-eye, .state-Idle .right-eye { animation: blink 4s infinite; }
        @keyframes blink { 0%,95%,100%{ry:30;} 97%{ry:2;} }

        .state-Listening .left-eye,  .state-Attentive .left-eye  { ry:50; rx:50; cy:180; cx:250; }
        .state-Listening .right-eye, .state-Attentive .right-eye { ry:50; rx:50; cy:180; cx:510; }
        .state-Listening .mouth, .state-Attentive .mouth { d: path("M 360 330 Q 380 360 400 330 Q 380 305 360 330"); fill:#00ffff; }

        .state-Thinking .left-eye  { ry:20; rx:40; cy:180; cx:250; transform-origin:250px 180px; animation: spin-left 2s infinite linear; }
        .state-Thinking .right-eye { ry:20; rx:40; cy:180; cx:510; transform-origin:510px 180px; animation: spin-right 2s infinite linear; }
        .state-Thinking .mouth { d: path("M 330 330 Q 360 310 380 330 T 430 330"); }
        @keyframes spin-left  { 100%{transform:rotate(360deg);}  }
        @keyframes spin-right { 100%{transform:rotate(-360deg);} }

        .state-Speaking .left-eye  { ry:25; rx:40; cy:190; cx:250; }
        .state-Speaking .right-eye { ry:25; rx:40; cy:190; cx:510; }
        .state-Speaking .mouth { d:path("M 300 330 Q 380 330 460 330 Q 380 375 300 330"); fill:#00ffff; animation:talk 0.3s infinite alternate; }
        @keyframes talk {
            0%   { d:path("M 300 330 Q 380 330 460 330 Q 380 345 300 330"); }
            100% { d:path("M 300 330 Q 380 330 460 330 Q 380 400 300 330"); }
        }

        /* ── State Label ── */
        #state-label {
            font-size: 15px;
            font-weight: 600;
            color: rgba(0,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        /* ── ESC hint ── */
        #esc-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            margin-bottom: 12px;
            transition: color 0.3s;
        }
        #esc-hint.active { color: rgba(255,100,100,0.7); }

        /* ── Transcript Panel ── */
        #transcript-panel {
            width: 90%;
            max-width: 760px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 16px 20px;
            min-height: 90px;
            max-height: 30%;
            overflow-y: auto;
            transition: all 0.4s ease;
            margin-bottom: 20px;
        }

        .transcript-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .transcript-user {
            font-size: 14px;
            color: #888;
        }
        .transcript-user span { color: rgba(0,255,255,0.7); font-weight: 600; }

        .transcript-spark {
            font-size: 16px;
            color: #ddd;
            line-height: 1.5;
        }
        .transcript-spark span { color: #a78bfa; font-weight: 600; }

        /* ── Start Button ── */
        #start-btn {
            padding: 14px 36px;
            font-size: 17px;
            background: linear-gradient(135deg, #00ffff, #0099cc);
            color: #0a0a0f;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            margin: 20px 0;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 0 30px rgba(0,255,255,0.3);
        }
        #start-btn:hover { transform: scale(1.05); box-shadow: 0 0 40px rgba(0,255,255,0.5); }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="spark-title">✦ SPARK</div>

        <div id="model-badge">
            <div id="mode-dot"></div>
            <span id="model-label">local · gemma3:1b</span>
        </div>

        <a href="/config" class="btn-config">⚙️ 設定</a>
    </div>

    <!-- Start Button -->
    <button id="start-btn" onclick="startSpark()">Enable Microphone &amp; Start Spark</button>

    <!-- Face -->
    <div id="face-wrapper" style="display:none;">
        <div id="face-container" class="state-Idle">
            <svg width="760" height="400" viewBox="0 0 760 400">
                <ellipse class="eye-fill left-eye"  cx="250" cy="190" rx="40" ry="30" />
                <ellipse class="eye-fill right-eye" cx="510" cy="190" rx="40" ry="30" />
                <path class="mouth" d="M 330 330 Q 380 345 430 330" />
            </svg>
        </div>

        <div id="state-label">Idle</div>
        <div id="esc-hint">Press ESC to stop speech</div>

        <!-- Transcript -->
        <div id="transcript-panel">
            <div class="transcript-row" id="transcript-row">
                <div class="transcript-user"><span>You:</span> —</div>
                <div class="transcript-spark"><span>Spark:</span> —</div>
            </div>
        </div>
    </div>

    <script>
        const faceContainer = document.getElementById('face-container');
        const stateLabel    = document.getElementById('state-label');
        const startBtn      = document.getElementById('start-btn');
        const faceWrapper   = document.getElementById('face-wrapper');
        const escHint       = document.getElementById('esc-hint');
        const modeDot       = document.getElementById('mode-dot');
        const modelLabel    = document.getElementById('model-label');
        const transcriptRow = document.getElementById('transcript-row');
        let ws;

        async function startSpark() {
            // Unsuspend audio context on first click
            if (playbackContext.state === 'suspended') {
                await playbackContext.resume();
            }
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('face-wrapper').style.display = 'flex';
            connectWebSocket();
        }

        // Current playback source so we can stop it
        let currentSource = null;
        let playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });

        // ── WebSocket ──────────────────────────────
        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.binaryType = 'arraybuffer';

            ws.onmessage = async function(event) {
                if (typeof event.data === "string") {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "state") {
                        const s = msg.value;
                        faceContainer.className = `state-${s}`;
                        stateLabel.innerText = s;
                        escHint.classList.toggle('active', s === 'Speaking');
                    } else if (msg.type === "transcript") {
                        updateTranscript(msg.user, msg.spark);
                    } else if (msg.type === "model_info") {
                        updateModelBadge(msg.mode, msg.model);
                    }
                } else if (event.data instanceof ArrayBuffer) {
                    playAudio(event.data);
                }
            };

            ws.onclose = () => setTimeout(connectWebSocket, 1000);
        }

        // ── Audio Playback ─────────────────────────
        function playAudio(arrayBuffer) {
            const int16Array  = new Int16Array(arrayBuffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 32768.0;
            }
            const audioBuffer = playbackContext.createBuffer(1, float32Array.length, 22050);
            audioBuffer.copyToChannel(float32Array, 0);

            if (currentSource) { try { currentSource.stop(); } catch(e){} }
            currentSource = playbackContext.createBufferSource();
            currentSource.buffer = audioBuffer;
            currentSource.connect(playbackContext.destination);
            currentSource.start();
        }

        // ── ESC Key → Stop Audio ──────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentSource) {
                try { currentSource.stop(); } catch(e){}
                currentSource = null;
                // Tell server to stop waiting
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({type: 'stop_audio'}));
                }
            }
        });

        // ── Model Badge Update ────────────────────
        function updateModelBadge(mode, model) {
            const shortModel = model.split('/').pop().split(':')[0];
            modelLabel.innerText = `${mode} · ${shortModel}`;
            modeDot.className = mode === 'cloud' ? 'cloud' : '';
            document.getElementById('btn-local').className = 'mode-btn' + (mode==='local' ? ' active-local' : '');
            document.getElementById('btn-cloud').className = 'mode-btn' + (mode==='cloud' ? ' active-cloud' : '');
        }

        // ── Transcript Update ─────────────────────
        function updateTranscript(userText, sparkText) {
            transcriptRow.innerHTML = `
                <div class="transcript-user"><span>You:</span> ${escapeHtml(userText)}</div>
                <div class="transcript-spark"><span>Spark:</span> ${escapeHtml(sparkText)}</div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ── Poll status for model badge on load ──
        async function pollStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateModelBadge(data.mode, data.model);
            } catch(e){}
        }

        // ── Start Spark ───────────────────────────
        async function startSpark() {
            try {
                const mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(mediaStream);
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(pcmData.buffer);
                    }
                };

                source.connect(processor);
                processor.connect(audioCtx.destination);

                startBtn.style.display = 'none';
                faceWrapper.style.display = 'block';
                remindersPanel.style.display = 'block';
                settingsPanel.style.display = 'block';
                loadReminders();
                loadSettings();
                connectWebSocket();
                faceWrapper.style.flexDirection = 'column';
                faceWrapper.style.alignItems = 'center';

            } catch (err) {
                alert("Microphone access denied. Please allow access and reload.");
            }
        }

        // Init — poll status immediately so badge is correct even after navigating from /config
        pollStatus();
        connectWebSocket();
        setInterval(pollStatus, 30000); // also refresh every 30s
    </script>
</body>
</html>
