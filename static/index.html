<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spark AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #07050f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            width: 100vw;
            font-family: "Inter", "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            color: #e0e0e0;
            overflow: hidden;
        }

        /* ── Top Bar ── */
        #top-bar {
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px 10px;
        }

        #spark-title {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ff7ebb;
            text-shadow: 0 0 20px rgba(255, 126, 187, 0.5);
        }

        /* ── Model Badge ── */
        #model-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            color: #aaa;
        }

        #mode-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff7ebb;
            animation: pulse-dot 2s infinite;
        }

        #mode-dot.cloud {
            background: #a78bfa;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Mode Toggle Buttons ── */
        .btn-config {
            padding: 7px 18px;
            border-radius: 20px;
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            background: transparent;
            color: #aaa;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-config:hover {
            border-color: #ff7ebb;
            color: #ff7ebb;
        }

        /* ── Face ── */
        #face-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 800px;
            flex: 1;
            justify-content: center;
        }

        #face-container {
            width: 100%;
            max-width: 760px;
            aspect-ratio: 1.9;
            position: relative;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .eye,
        .mouth {
            fill: none;
            stroke: #00ffff;
            stroke-width: 15;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
        }

        .eye-fill {
            fill: #00ffff;
            transition: all 0.3s ease-in-out;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
        }

        /* ── Cat Ears & Whiskers ── */
        .cat-ear {
            fill: none;
            stroke: #ff7ebb;
            stroke-width: 12;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.3s ease-in-out;
            filter: drop-shadow(0 0 12px rgba(255, 126, 187, 0.4));
        }

        .inner-ear {
            fill: #ff7ebb;
            opacity: 0.25;
            transition: all 0.3s ease-in-out;
        }

        .cat-whisker {
            fill: none;
            stroke: #ff7ebb;
            stroke-width: 6;
            stroke-linecap: round;
            opacity: 0.6;
            transition: all 0.3s ease-in-out;
            filter: drop-shadow(0 0 5px rgba(255, 126, 187, 0.3));
        }

        /* ── SVG Ear twitching & thinking (fly ears) Animations ── */
        .state-Listening .left-ear, .state-Attentive .left-ear {
            animation: twitch-left 0.4s infinite alternate ease-in-out;
        }
        .state-Listening .right-ear, .state-Attentive .right-ear {
            animation: twitch-right 0.4s infinite alternate ease-in-out;
        }

        @keyframes twitch-left {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-4deg); transform-origin: 230px 110px; }
        }

        @keyframes twitch-right {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(4deg); transform-origin: 530px 110px; }
        }

        .state-Thinking .left-ear {
            transform: rotate(-16deg) translate(-15px, 8px);
            transform-origin: 230px 110px;
        }

        .state-Thinking .right-ear {
            transform: rotate(16deg) translate(15px, 8px);
            transform-origin: 530px 110px;
        }

        .state-Speaking .left-ear, .state-Speaking .right-ear {
            animation: speak-ear 0.2s infinite alternate ease-in-out;
        }

        @keyframes speak-ear {
            0% { transform: translateY(0); }
            100% { transform: translateY(-4px); }
        }

        .state-Speaking .cat-whisker {
            animation: wiggle-whiskers 0.1s infinite alternate ease-in-out;
        }

        @keyframes wiggle-whiskers {
            0% { transform: translateY(0); }
            100% { transform: translateY(-2px); }
        }

        /* States */
        .state-Idle .left-eye {
            ry: 30;
            rx: 40;
            cy: 190;
            cx: 250;
        }

        .state-Idle .right-eye {
            ry: 30;
            rx: 40;
            cy: 190;
            cx: 510;
        }

        .state-Idle .mouth {
            d: path("M 330 330 Q 380 345 430 330");
        }

        .state-Idle .left-eye,
        .state-Idle .right-eye {
            animation: blink 4s infinite;
        }

        @keyframes blink {
            0%, 95%, 100% { ry: 30; }
            97% { ry: 2; }
        }

        .state-Listening .left-eye,
        .state-Attentive .left-eye {
            ry: 50;
            rx: 50;
            cy: 180;
            cx: 250;
        }

        .state-Listening .right-eye,
        .state-Attentive .right-eye {
            ry: 50;
            rx: 50;
            cy: 180;
            cx: 510;
        }

        .state-Listening .mouth,
        .state-Attentive .mouth {
            d: path("M 360 330 Q 380 360 400 330 Q 380 305 360 330");
            fill: #00ffff;
        }

        .state-Thinking .left-eye {
            ry: 20;
            rx: 40;
            cy: 180;
            cx: 250;
            transform-origin: 250px 180px;
            animation: spin-left 2s infinite linear;
        }

        .state-Thinking .right-eye {
            ry: 20;
            rx: 40;
            cy: 180;
            cx: 510;
            transform-origin: 510px 180px;
            animation: spin-right 2s infinite linear;
        }

        .state-Thinking .mouth {
            d: path("M 330 330 Q 360 310 380 330 T 430 330");
        }

        @keyframes spin-left {
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-right {
            100% { transform: rotate(-360deg); }
        }

        .state-Speaking .left-eye {
            ry: 25;
            rx: 40;
            cy: 190;
            cx: 250;
        }

        .state-Speaking .right-eye {
            ry: 25;
            rx: 40;
            cy: 190;
            cx: 510;
        }

        .state-Speaking .mouth {
            d: path("M 300 330 Q 380 330 460 330 Q 380 375 300 330");
            fill: #00ffff;
            animation: talk 0.3s infinite alternate;
        }

        @keyframes talk {
            0% { d: path("M 300 330 Q 380 330 460 330 Q 380 345 300 330"); }
            100% { d: path("M 300 330 Q 380 330 460 330 Q 380 400 300 330"); }
        }

        /* ── State Label ── */
        #state-label {
            font-size: 15px;
            font-weight: 600;
            color: rgba(255, 126, 187, 0.6);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -8px;
            margin-bottom: 10px;
        }

        /* ── ESC hint ── */
        #esc-hint {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-bottom: 12px;
            transition: color 0.3s;
        }

        #esc-hint.active {
            color: rgba(255, 100, 100, 0.7);
        }

        /* ── Transcript Panel ── */
        #transcript-panel {
            width: 90%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 20px;
            min-height: 90px;
            max-height: 25%;
            overflow-y: auto;
            transition: all 0.4s ease;
            margin-bottom: 15px;
        }

        .transcript-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .transcript-user {
            font-size: 14px;
            color: #888;
        }

        .transcript-user span {
            color: rgba(0, 255, 255, 0.7);
            font-weight: 600;
        }

        .transcript-spark {
            font-size: 16px;
            color: #ddd;
            line-height: 1.5;
        }

        .transcript-spark span {
            color: #ff7ebb;
            font-weight: 600;
        }

        /* ── Dashboard Glassmorphism Panel ── */
        #mimo-dashboard {
            width: 90%;
            max-width: 760px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .dash-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dash-btn {
            padding: 10px 22px;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #ff7ebb, #c084fc);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 0 15px rgba(255, 126, 187, 0.3);
            font-family: inherit;
        }

        .dash-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 0 25px rgba(255, 126, 187, 0.5);
        }

        .dash-btn.cyan {
            background: linear-gradient(135deg, #00ffff, #0099cc);
            color: #07050f;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .dash-btn.cyan:hover {
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.5);
        }

        .temp-control {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 14px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 140px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00ffff;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffff;
            transition: .1s;
        }

        #temp-display {
            font-weight: 700;
            color: #00ffff;
            min-width: 60px;
            text-align: right;
        }

        /* ── Start Button ── */
        #start-btn {
            padding: 14px 36px;
            font-size: 17px;
            background: linear-gradient(135deg, #ff7ebb, #c084fc);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            margin: 20px 0;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 0 30px rgba(255, 126, 187, 0.3);
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 126, 187, 0.5);
        }

        @keyframes loading-bar-slide {
            0% { left: -70px; }
            100% { left: 250px; }
        }
    </style>
</head>

<body>

    <!-- Mimo Loader Overlay -->
    <div id="mimo-loader" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#07050f; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition: opacity 0.5s ease;">
        <!-- Sleeping/Loading Cat SVG icon -->
        <svg width="200" height="200" viewBox="0 0 760 400" style="margin-bottom: 20px;">
            <polygon class="cat-ear" points="180,120 280,110 160,30" />
            <polygon class="inner-ear" points="200,115 260,110 185,55" />
            <polygon class="cat-ear" points="480,110 580,120 600,30" />
            <polygon class="inner-ear" points="500,110 560,115 575,55" />
            <!-- Sleeping eyes (closed arcs) -->
            <path d="M 210 190 Q 250 210 290 190" stroke="#ff7ebb" stroke-width="15" stroke-linecap="round" fill="none" />
            <path d="M 470 190 Q 510 210 550 190" stroke="#ff7ebb" stroke-width="15" stroke-linecap="round" fill="none" />
            <path class="mouth" d="M 330 330 Q 380 345 430 330" />
        </svg>
        <h2 style="font-size:22px; font-weight:700; color:#ff7ebb; margin-bottom:12px; text-shadow:0 0 15px rgba(255,126,187,0.4); letter-spacing:1px;">🐈 MIMO 正在熱身大腦中...</h2>
        <p style="font-size:14px; color:#888;">請稍候喵，本喵正在載入 Whisper、合成專屬語音快取...</p>
        <!-- Sleek progress glow bar -->
        <div style="width:250px; height:4px; background:rgba(255,255,255,0.06); border-radius:2px; margin-top:20px; overflow:hidden; position:relative;">
            <div style="width:70px; height:100%; background:linear-gradient(90deg, #ff7ebb, #c084fc); position:absolute; left:-70px; animation: loading-bar-slide 1.5s infinite linear; box-shadow:0 0 10px #ff7ebb;"></div>
        </div>
    </div>

    <!-- Top Bar -->
    <div id="top-bar">
        <div id="spark-title">🐈 MIMO</div>

        <div id="model-badge">
            <div id="mode-dot"></div>
            <span id="model-label">local · gemma3:1b</span>
        </div>

        <a href="/config" class="btn-config">⚙️ 設定</a>
    </div>

    <!-- Start Button — shown only if mic permission not yet granted -->
    <button id="start-btn" onclick="startSpark()" style="display:none;">Enable Microphone &amp; Start Mimo</button>

    <!-- Face -->
    <div id="face-wrapper" style="display:none;">
        <div id="face-container" class="state-Idle">
            <svg width="760" height="400" viewBox="0 0 760 400">
                <!-- Left Cat Ear -->
                <polygon class="cat-ear" points="180,120 280,110 160,30" />
                <polygon class="inner-ear" points="200,115 260,110 185,55" />
                
                <!-- Right Cat Ear -->
                <polygon class="cat-ear" points="480,110 580,120 600,30" />
                <polygon class="inner-ear" points="500,110 560,115 575,55" />

                <!-- Left Whiskers -->
                <line class="cat-whisker left-whisker" x1="220" y1="280" x2="100" y2="265" />
                <line class="cat-whisker left-whisker" x1="210" y1="300" x2="80" y2="300" />
                <line class="cat-whisker left-whisker" x1="220" y1="320" x2="100" y2="335" />

                <!-- Right Whiskers -->
                <line class="cat-whisker right-whisker" x1="540" y1="280" x2="660" y2="265" />
                <line class="cat-whisker right-whisker" x1="550" y1="300" x2="680" y2="300" />
                <line class="cat-whisker right-whisker" x1="540" y1="320" x2="660" y2="335" />

                <!-- Eyes and Mouth -->
                <ellipse class="eye-fill left-eye" cx="250" cy="190" rx="40" ry="30" />
                <ellipse class="eye-fill right-eye" cx="510" cy="190" rx="40" ry="30" />
                <path class="mouth" d="M 330 330 Q 380 345 430 330" />
            </svg>
        </div>

        <div id="state-label">Idle</div>
        <div id="esc-hint">Press ESC to stop speech</div>

        <!-- Transcript -->
        <div id="transcript-panel">
            <div class="transcript-row" id="transcript-row">
                <div class="transcript-user"><span>You:</span> —</div>
                <div class="transcript-spark"><span>Mimo:</span> —</div>
            </div>
        </div>

        <!-- Glassmorphism Interactive Dashboard -->
        <div id="mimo-dashboard">
            <!-- Left: Pet the Cat -->
            <div class="dash-section">
                <button id="btn-pet" onclick="petMimo()" class="dash-btn">🐾 擼貓摸摸</button>
            </div>

            <!-- Right: Temperature Simulation -->
            <div class="dash-section temp-control">
                <span>🌡️ 體溫模擬:</span>
                <input type="range" id="temp-slider" min="35.0" max="42.0" step="0.1" value="36.5" oninput="updateTempDisplay(this.value)">
                <span id="temp-display">36.5 °C</span>
                <button id="btn-measure" onclick="measureTemp()" class="dash-btn cyan">測量</button>
            </div>
        </div>
    </div>

    <script>
        const faceContainer = document.getElementById('face-container');
        const stateLabel = document.getElementById('state-label');
        const startBtn = document.getElementById('start-btn');
        const faceWrapper = document.getElementById('face-wrapper');
        const escHint = document.getElementById('esc-hint');
        const modeDot = document.getElementById('mode-dot');
        const modelLabel = document.getElementById('model-label');
        const transcriptRow = document.getElementById('transcript-row');
        let ws;
        let micStarted = false;  // guard against starting mic twice


        // Current playback source so we can stop it
        let currentSource = null;
        let playbackContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 22050 });

        // ── Interactive Dashboard Functions ──
        function petMimo() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'pet_cat' }));
            }
        }

        function updateTempDisplay(val) {
            document.getElementById('temp-display').innerText = `${parseFloat(val).toFixed(1)} °C`;
        }

        function measureTemp() {
            const val = parseFloat(document.getElementById('temp-slider').value);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ type: 'temp_measure', value: val }));
            }
        }

        // ── WebSocket ──────────────────────────────
        function connectWebSocket() {
            ws = new WebSocket(`ws://${window.location.host}/ws`);
            ws.binaryType = 'arraybuffer';

            ws.onmessage = async function (event) {
                if (typeof event.data === "string") {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "state") {
                        const s = msg.value;
                        if (s === "Loading") {
                            document.getElementById('mimo-loader').style.display = 'flex';
                            document.getElementById('mimo-loader').style.opacity = '1';
                        } else {
                            const loader = document.getElementById('mimo-loader');
                            if (loader && loader.style.display !== 'none') {
                                loader.style.opacity = '0';
                                setTimeout(() => { loader.style.display = 'none'; }, 500);
                            }
                        }
                        faceContainer.className = `state-${s}`;
                        stateLabel.innerText = s;
                        escHint.classList.toggle('active', s === 'Speaking');
                    } else if (msg.type === "transcript") {
                        updateTranscript(msg.user, msg.spark);
                    } else if (msg.type === "model_info") {
                        updateModelBadge(msg.mode, msg.model);
                    }
                } else if (event.data instanceof ArrayBuffer) {
                    playAudio(event.data);
                }
            };

            ws.onclose = () => setTimeout(connectWebSocket, 1000);
        }

        // ── Audio Playback ─────────────────────────
        function playAudio(arrayBuffer) {
            const int16Array = new Int16Array(arrayBuffer);
            const float32Array = new Float32Array(int16Array.length);
            for (let i = 0; i < int16Array.length; i++) {
                float32Array[i] = int16Array[i] / 32768.0;
            }
            const audioBuffer = playbackContext.createBuffer(1, float32Array.length, 22050);
            audioBuffer.copyToChannel(float32Array, 0);

            if (currentSource) { try { currentSource.stop(); } catch (e) { } }
            currentSource = playbackContext.createBufferSource();
            currentSource.buffer = audioBuffer;
            currentSource.connect(playbackContext.destination);
            currentSource.start();
        }

        // ── ESC Key → Stop Audio ──────────────────
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && currentSource) {
                try { currentSource.stop(); } catch (e) { }
                currentSource = null;
                // Tell server to stop waiting
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'stop_audio' }));
                }
            }
        });

        // ── Model Badge Update ────────────────────
        function updateModelBadge(mode, model) {
            const shortModel = model.split('/').pop().split(':')[0];
            modelLabel.innerText = `${mode} · ${shortModel}`;
            modeDot.className = mode === 'cloud' ? 'cloud' : '';
        }

        // ── Transcript Update ─────────────────────
        function updateTranscript(userText, sparkText) {
            transcriptRow.innerHTML = `
                <div class="transcript-user"><span>You:</span> ${escapeHtml(userText)}</div>
                <div class="transcript-spark"><span>Mimo:</span> ${escapeHtml(sparkText)}</div>
            `;
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // ── Poll status for model badge on load ──
        async function pollStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                updateModelBadge(data.mode, data.model);
            } catch (e) { }
        }

        // ── Start Spark ───────────────────────────
        async function startSpark() {
            if (micStarted) return;  // prevent double-init
            try {
                const mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                micStarted = true;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(mediaStream);
                const processor = audioCtx.createScriptProcessor(2048, 1, 1);

                processor.onaudioprocess = (e) => {
                    const inputData = e.inputBuffer.getChannelData(0);
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-1, Math.min(1, inputData[i])) * 0x7FFF;
                    }
                    if (ws && ws.readyState === WebSocket.OPEN) {
                        ws.send(pcmData.buffer);
                    }
                };

                source.connect(processor);
                processor.connect(audioCtx.destination);

                startBtn.style.display = 'none';
                faceWrapper.style.display = 'flex';
                faceWrapper.style.flexDirection = 'column';
                faceWrapper.style.alignItems = 'center';

            } catch (err) {
                // Mic permission was denied — show the button so user can retry
                startBtn.style.display = 'block';
                alert('麥克風存取被拒絕，請允許後重新整理頁面。');
            }
        }

        async function tryAutoStart() {
            // Check if permission was already granted — if so, start silently
            try {
                const perm = await navigator.permissions.query({ name: 'microphone' });
                if (perm.state === 'granted') {
                    await startSpark();
                    return;
                }
            } catch (e) { /* permissions API not available */ }
            // Else show the start button and wait for user click
            startBtn.style.display = 'block';
        }

        // Init — poll status immediately; auto-start mic if already permitted
        pollStatus();
        connectWebSocket();
        tryAutoStart();
        setInterval(pollStatus, 30000);
    </script>
</body>
